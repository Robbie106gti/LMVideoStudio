# Release — build installer artifacts on tag (unsigned skeleton)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            src/LMVideoStudio.Client/package-lock.json
            src/LMVideoStudio.Tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests
        shell: pwsh
        run: |
          dotnet test LMVideoStudio.sln -c Release --verbosity normal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build sidecar layout (no venv copy in CI)
        shell: pwsh
        run: |
          if (-not (Test-Path spike\.venv)) {
            Write-Host "spike\.venv missing — skipping sidecar build (full installer requires local venv copy)"
            exit 0
          }
          .\scripts\build-sidecars.ps1 -SkipVenvCopy
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build installer (unsigned)
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -SkipSidecars -AllowSpikeVenvFallback
        continue-on-error: true

      - name: Generate latest.json skeleton
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -match 'refs/tags/(.*)') { $Matches[1].TrimStart('v') } else { '0.1.0' }
          .\scripts\generate-latest-json.ps1 -Version $tag

      - name: Upload bundle artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: lmvs-installer-bundle
          path: |
            src/LMVideoStudio.Tauri/src-tauri/target/release/bundle/**
            out/latest.json
          if-no-files-found: ignore

      - name: Release notes placeholder
        shell: pwsh
        run: |
          Write-Host "Configure code signing (minisign) before publishing to GitHub Releases."
          Write-Host "Tag: $env:GITHUB_REF"
