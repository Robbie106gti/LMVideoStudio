# Release — build installer artifacts on tag (unsigned skeleton)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            src/LMVideoStudio.Client/package-lock.json
            src/LMVideoStudio.Tauri/package-lock.json

      - name: Run unit tests
        shell: pwsh
        run: |
          dotnet test LMVideoStudio.sln -c Release --verbosity normal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build installer skeleton (unsigned)
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -SkipSidecars
        continue-on-error: true

      - name: Upload bundle artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: lmvs-installer-bundle
          path: |
            src/LMVideoStudio.Tauri/src-tauri/target/release/bundle/**
          if-no-files-found: ignore

      - name: Release notes placeholder
        shell: pwsh
        run: |
          Write-Host "Configure code signing (minisign) before publishing to GitHub Releases."
          Write-Host "Tag: $env:GITHUB_REF"
