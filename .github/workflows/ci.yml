# CI — Domain + Host + Fable Client build on PR/push
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dotnet-fable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/LMVideoStudio.Client/package-lock.json

      - name: Restore and build solution
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "src"
          if (-not (Test-Path $src)) {
            Write-Host "src/ not present — skipping dotnet build (Phase 0 skeleton OK)"
            exit 0
          }
          $sln = Join-Path $env:GITHUB_WORKSPACE "LMVideoStudio.sln"
          if (Test-Path $sln) {
            dotnet restore $sln
            dotnet build $sln -c Release --no-restore
          }
          else {
            $proj = Get-ChildItem -Path $src -Recurse -Filter "LMVideoStudio.Host.fsproj" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $proj) { throw "No Host .fsproj under src/" }
            dotnet restore $proj.FullName
            dotnet build $proj.FullName -c Release --no-restore
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: dotnet test
        shell: pwsh
        run: |
          $tests = Join-Path $env:GITHUB_WORKSPACE "tests"
          if (-not (Test-Path $tests)) {
            Write-Host "tests/ not present — skipping dotnet test"
            exit 0
          }
          $sln = Join-Path $env:GITHUB_WORKSPACE "LMVideoStudio.sln"
          if (Test-Path $sln) {
            dotnet test $sln -c Release --verbosity normal
          } else {
            dotnet test $tests -c Release --verbosity normal
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Python worker /health smoke (pytest)
        shell: pwsh
        run: |
          $pythonDir = Join-Path $env:GITHUB_WORKSPACE "python"
          if (-not (Test-Path $pythonDir)) {
            Write-Host "python/ not present — skipping worker pytest"
            exit 0
          }
          python -m pip install --upgrade pip
          pip install pytest fastapi httpx pillow pydantic
          Push-Location $pythonDir
          python -m pytest tests -v --tb=short
          Pop-Location
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Fable compile + Vite build (Client)
        shell: pwsh
        working-directory: src/LMVideoStudio.Client
        run: |
          if (-not (Test-Path package.json)) { throw "Client package.json missing" }
          npm ci
          npm run fable
          npm run build

      - name: Model manifest sanity
        shell: pwsh
        run: |
          $manifest = Join-Path $env:GITHUB_WORKSPACE "config\models.manifest.json"
          if (-not (Test-Path $manifest)) { throw "Missing models manifest" }
          $null = Get-Content $manifest -Raw | ConvertFrom-Json
          Write-Host "models.manifest.json parses OK"

      - name: PowerShell script syntax (build scripts, sync_models, lmvs CLI)
        shell: pwsh
        run: |
          foreach ($script in @(
              "scripts/build-prereqs.ps1",
              "scripts/build-sidecars.ps1",
              "scripts/build-installer.ps1",
              "scripts/build-msix.ps1",
              "scripts/verify-sidecar-staging.ps1",
              "scripts/sync_models.ps1",
              "scripts/gpu_e2e_smoke.ps1",
              "cli/lmvs/lmvs.ps1"
            )) {
            $path = Join-Path $env:GITHUB_WORKSPACE $script
            if (-not (Test-Path $path)) { throw "Missing $script" }
            $tokens = $null
            $errs = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errs)
            if ($errs) { $errs; throw "$script parse errors" }
          }
          Write-Host "Script parse OK"

      - name: Host self-contained publish smoke
        shell: pwsh
        run: |
          $proj = Join-Path $env:GITHUB_WORKSPACE "src\LMVideoStudio.Host\LMVideoStudio.Host.fsproj"
          if (-not (Test-Path $proj)) { Write-Host "Host project missing — skip"; exit 0 }
          $out = Join-Path $env:RUNNER_TEMP "lmvs-host-publish"
          dotnet publish $proj -c Release -r win-x64 -o $out `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $exe = Join-Path $out "LMVideoStudio.Host.exe"
          if (-not (Test-Path $exe)) { throw "Missing published Host exe" }
          if ((Get-Item $exe).Length -lt 5MB) { throw "Host exe smaller than expected for self-contained publish" }
          Write-Host "Self-contained Host publish OK ($('{0:N1}' -f ((Get-Item $exe).Length / 1MB)) MB)"
